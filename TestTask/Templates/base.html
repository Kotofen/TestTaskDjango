<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Default title{% endblock title %}</title>
    <style>
        ul{
          list-style-type: none;
          margin: 0;
          padding: 0;
          overflow: hidden;
          background-color: #333;
          }
        li{
          float: left;
          }
          li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            border-right: 1px solid #bbb;
            text-decoration: none;
            font-size: 26px;
            font-family: Arial, Helvetica, sans-serif;
          }
          li:last-child {
          border-right: none;
          border-left: 1px solid #bbb;
          }
          li a:hover {
            background-color: #999999;
            }
          body {
            background-color: #ccfbff;
            }
          h1{
            font-size: 42px;
          }
          h2{
            font-size: 32px;
          }
          p{
            font-size: 24px;
          }
          table, th, td {
          font-size: 24px;
          }

    </style>
</head>
<body>
    <ul>
        <li><a href="transactions">Записи о ДДС</a></li>
        <li><a href="statuses">Списки: Статус</a></li>
        <li><a href="types">Списки: Тип</a></li>
        <li><a href="categories">Списки: Категория</a></li>
        <li><a href="subcategories">Списки: Подкатегория</a></li>
    </ul>
    <h1 align="center">{% block header %}{% endblock header %}</h1>
    <div>{% block content %}{% endblock content %}</div>
</body>
</html>
